<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>懒人记账 - 便携版</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="懒人记账">
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/icons/svg?seed=wallet&backgroundColor=F27D26">
    <link rel="manifest" href="manifest.json">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #F7F7F5;
        }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        ::-webkit-scrollbar { display: none; }
        
        /* Custom Animations */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/clsx@2.0.0/dist/clsx.min.js"></script>
    <script src="https://unpkg.com/tailwind-merge@1.14.0/dist/bundle-client.umd.js"></script>

    <script type="text/javascript">
        const { useState, useEffect, useMemo, useRef } = React;
        const { motion, AnimatePresence } = FramerMotion;
        const { 
            PieChart, Pie, Cell, ResponsiveContainer, Tooltip,
            BarChart, Bar, XAxis, YAxis, CartesianGrid
        } = Recharts;

        // Utility for Tailwind classes
        function cn(...inputs) {
            return TailwindMerge.twMerge(clsx.clsx(inputs));
        }

        // Icon Component
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    const icon = lucide.icons[name];
                    if (icon) {
                        const svg = lucide.createIcons({
                            icons: { [name]: icon },
                            attrs: { strokeWidth: 2, size, class: className }
                        });
                    }
                }
            }, [name, size, className]);
            return React.createElement('i', { 'data-lucide': name, ref: iconRef, className });
        };

        const CATEGORIES = ["餐饮", "交通", "购物", "娱乐", "居家", "医疗", "教育", "人情", "其他"];
        const COLORS = ['#F27D26', '#37352F', '#07C160', '#2D9CDB', '#9B51E0', '#F2994A', '#EB5757', '#27AE60', '#BDBDBD'];

        const App = () => {
            // State with LocalStorage persistence
            const [messages, setMessages] = useState(() => {
                const saved = localStorage.getItem('lazy_messages');
                return saved ? JSON.parse(saved) : [{
                    id: '1',
                    text: "你好！我是你的 AI 记账助手。你可以直接对我说“中午吃面花了15元”，我会帮你自动记账。",
                    sender: 'ai',
                    timestamp: new Date().toISOString()
                }];
            });

            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('lazy_tx');
                return saved ? JSON.parse(saved) : [];
            });

            const [userProfile, setUserProfile] = useState(() => {
                const saved = localStorage.getItem('lazy_profile');
                return saved ? JSON.parse(saved) : { name: "记账达人", avatar: "" };
            });
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('lazy_gemini_key') || "");
            
            const [activeTab, setActiveTab] = useState('chat');
            const [inputText, setInputText] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            const [statsPeriod, setStatsPeriod] = useState('month');

            const messagesEndRef = useRef(null);

            // Sync to LocalStorage
            useEffect(() => localStorage.setItem('lazy_messages', JSON.stringify(messages)), [messages]);
            useEffect(() => localStorage.setItem('lazy_tx', JSON.stringify(transactions)), [transactions]);
            useEffect(() => localStorage.setItem('lazy_profile', JSON.stringify(userProfile)), [userProfile]);
            useEffect(() => localStorage.setItem('lazy_gemini_key', apiKey), [apiKey]);

            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);

            const handleSendMessage = async () => {
                if (!inputText.trim()) return;

                const userMsg = {
                    id: Date.now().toString(),
                    text: inputText,
                    sender: 'user',
                    timestamp: new Date().toISOString()
                };

                setMessages(prev => [...prev, userMsg]);
                setInputText('');

                if (!apiKey) {
                    setTimeout(() => {
                        setMessages(prev => [...prev, {
                            id: (Date.now() + 1).toString(),
                            text: "⚠️ 离线版需要配置 Gemini API Key 才能使用 AI 自动记账。请在右上角设置中输入您的 Key。",
                            sender: 'ai',
                            timestamp: new Date().toISOString()
                        }]);
                    }, 600);
                    return;
                }

                setIsGenerating(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `你是一个极简记账助手。解析用户的输入并提取交易信息。
                                    返回格式必须是 JSON: {"amount": 数字, "category": "餐饮/交通/购物/娱乐/居家/医疗/教育/人情/其他", "description": "简短描述", "reply": "已记账(类别)金额元"}
                                    用户输入: "${inputText}"`
                                }]
                            }]
                        })
                    });
                    
                    const data = await response.json();
                    const aiRaw = data.candidates[0].content.parts[0].text;
                    const jsonMatch = aiRaw.match(/\{.*\}/s);
                    
                    if (jsonMatch) {
                        const result = JSON.parse(jsonMatch[0]);
                        const newTx = {
                            id: Date.now().toString(),
                            amount: result.amount,
                            category: result.category,
                            description: result.description,
                            date: new Date().toISOString(),
                            type: 'expense'
                        };
                        setTransactions(prev => [newTx, ...prev]);
                        setMessages(prev => [...prev, {
                            id: (Date.now() + 1).toString(),
                            text: result.reply,
                            sender: 'ai',
                            timestamp: new Date().toISOString()
                        }]);
                    } else {
                        throw new Error("Parse Error");
                    }
                } catch (e) {
                    setMessages(prev => [...prev, {
                        id: (Date.now() + 1).toString(),
                        text: "❌ AI 解析失败。请检查网络或 API Key 是否正确。",
                        sender: 'ai',
                        timestamp: new Date().toISOString()
                    }]);
                } finally {
                    setIsGenerating(false);
                }
            };

            const totalExpense = useMemo(() => {
                return transactions.reduce((acc, t) => acc + t.amount, 0);
            }, [transactions]);

            const categoryData = useMemo(() => {
                const map = {};
                transactions.forEach(t => {
                    map[t.category] = (map[t.category] || 0) + t.amount;
                });
                return Object.entries(map).map(([name, value]) => ({ name, value }));
            }, [transactions]);

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-[#F7F7F5] overflow-hidden shadow-2xl relative border-x border-[#37352F]/10">
                    {/* Header */}
                    <header className="bg-white/80 backdrop-blur-md border-b border-[#37352F]/5 p-4 flex items-center justify-between sticky top-0 z-20 safe-top">
                        <div className="flex items-center gap-3">
                            <div className="w-8 h-8 bg-[#37352F] rounded-lg flex items-center justify-center text-white font-bold text-sm">
                                {userProfile.name[0]}
                            </div>
                            <h1 className="text-sm font-bold text-[#37352F] tracking-tight">懒人记账</h1>
                        </div>
                        <button onClick={() => setShowSettings(true)} className="p-2 hover:bg-[#37352F]/5 rounded-full transition-colors">
                            <Icon name="Settings" size={20} className="text-[#37352F]/40" />
                        </button>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto pb-24">
                        {activeTab === 'chat' && (
                            <div className="p-4 space-y-6">
                                {messages.map((msg) => (
                                    <motion.div 
                                        key={msg.id}
                                        initial={{ opacity: 0, y: 10 }}
                                        animate={{ opacity: 1, y: 0 }}
                                        className={cn("flex flex-col", msg.sender === 'user' ? "items-end" : "items-start")}
                                    >
                                        <div className={cn(
                                            "max-w-[85%] p-3.5 rounded-2xl text-sm shadow-sm",
                                            msg.sender === 'user' 
                                                ? "bg-[#37352F] text-white rounded-tr-none" 
                                                : "bg-white text-[#37352F] border border-[#37352F]/5 rounded-tl-none"
                                        )}>
                                            {msg.text}
                                        </div>
                                        <span className="text-[10px] text-[#37352F]/20 mt-1 px-1">
                                            {new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                        </span>
                                    </motion.div>
                                ))}
                                <div ref={messagesEndRef} />
                            </div>
                        )}

                        {activeTab === 'stats' && (
                            <div className="p-6 space-y-8">
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-[#37352F]/5">
                                    <div className="flex justify-between items-end mb-6">
                                        <div>
                                            <p className="text-[10px] font-bold text-[#37352F]/40 uppercase tracking-widest">累计支出</p>
                                            <h2 className="text-3xl font-bold text-[#37352F] mt-1">¥{totalExpense.toFixed(2)}</h2>
                                        </div>
                                        <div className="bg-[#07C160]/10 text-[#07C160] text-[10px] font-bold px-2 py-1 rounded-md">
                                            本月
                                        </div>
                                    </div>
                                    
                                    {categoryData.length > 0 ? (
                                        <div className="h-64">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <PieChart>
                                                    <Pie
                                                        data={categoryData}
                                                        cx="50%"
                                                        cy="50%"
                                                        innerRadius={60}
                                                        outerRadius={80}
                                                        paddingAngle={5}
                                                        dataKey="value"
                                                    >
                                                        {categoryData.map((entry, index) => (
                                                            <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                                        ))}
                                                    </Pie>
                                                    <Tooltip />
                                                </PieChart>
                                            </ResponsiveContainer>
                                        </div>
                                    ) : (
                                        <div className="h-64 flex flex-col items-center justify-center text-[#37352F]/20">
                                            <Icon name="BarChart3" size={48} className="mb-2 opacity-20" />
                                            <p className="text-xs">暂无数据</p>
                                        </div>
                                    )}
                                </div>

                                <div className="space-y-4">
                                    <h3 className="text-[10px] font-bold text-[#37352F]/40 uppercase tracking-widest px-1">最近记录</h3>
                                    {transactions.slice(0, 10).map(tx => (
                                        <div key={tx.id} className="bg-white p-4 rounded-2xl flex items-center justify-between border border-[#37352F]/5 shadow-sm">
                                            <div className="flex items-center gap-3">
                                                <div className="w-10 h-10 bg-[#F7F7F5] rounded-xl flex items-center justify-center text-lg">
                                                    {tx.category[0]}
                                                </div>
                                                <div>
                                                    <p className="text-sm font-bold text-[#37352F]">{tx.category}</p>
                                                    <p className="text-[10px] text-[#37352F]/40">{tx.description || '无备注'}</p>
                                                </div>
                                            </div>
                                            <p className="text-sm font-bold text-[#37352F]">-¥{tx.amount.toFixed(2)}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom Navigation */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/80 backdrop-blur-xl border-t border-[#37352F]/5 safe-bottom z-30">
                        {activeTab === 'chat' && (
                            <div className="p-4 flex gap-2 items-center">
                                <div className="flex-1 relative">
                                    <input 
                                        type="text" 
                                        value={inputText}
                                        onChange={e => setInputText(e.target.value)}
                                        onKeyPress={e => e.key === 'Enter' && handleSendMessage()}
                                        placeholder={isGenerating ? "AI 正在思考..." : "输入记账内容..."}
                                        disabled={isGenerating}
                                        className="w-full bg-white border border-[#37352F]/10 rounded-2xl py-3.5 px-5 text-sm outline-none focus:ring-2 focus:ring-[#37352F]/5 transition-all disabled:opacity-50"
                                    />
                                </div>
                                <button 
                                    onClick={handleSendMessage} 
                                    disabled={!inputText.trim() || isGenerating}
                                    className="w-12 h-12 bg-[#37352F] text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 transition-all disabled:opacity-50"
                                >
                                    <Icon name="Send" size={20} />
                                </button>
                            </div>
                        )}
                        <div className="flex justify-around items-center px-4">
                            <button onClick={() => setActiveTab('chat')} className={cn("flex flex-col items-center gap-1 transition-all", activeTab === 'chat' ? "text-[#37352F] scale-110" : "text-[#37352F]/30")}>
                                <Icon name="MessageSquare" size={22} />
                                <span className="text-[10px] font-bold">记账</span>
                            </button>
                            <button onClick={() => setActiveTab('stats')} className={cn("flex flex-col items-center gap-1 transition-all", activeTab === 'stats' ? "text-[#37352F] scale-110" : "text-[#37352F]/30")}>
                                <Icon name="BarChart3" size={22} />
                                <span className="text-[10px] font-bold">账单</span>
                            </button>
                        </div>
                    </div>

                    {/* Settings Modal */}
                    <AnimatePresence>
                        {showSettings && (
                            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-6">
                                <motion.div 
                                    initial={{ scale: 0.9, opacity: 0 }}
                                    animate={{ scale: 1, opacity: 1 }}
                                    exit={{ scale: 0.9, opacity: 0 }}
                                    className="bg-white w-full rounded-3xl p-8 shadow-2xl border border-[#37352F]/10"
                                >
                                    <h3 className="text-xl font-bold mb-6 text-[#37352F]">便携版设置</h3>
                                    <div className="space-y-5">
                                        <div>
                                            <label className="text-[10px] font-bold text-[#37352F]/40 uppercase tracking-widest block mb-2 px-1">Gemini API Key</label>
                                            <input 
                                                type="password" 
                                                value={apiKey}
                                                onChange={e => setApiKey(e.target.value)}
                                                placeholder="输入您的 Google AI API Key"
                                                className="w-full bg-[#F7F7F5] border border-[#37352F]/10 rounded-xl p-4 text-sm outline-none focus:ring-2 focus:ring-[#37352F]/5"
                                            />
                                            <p className="text-[9px] text-[#37352F]/40 mt-2 px-1 leading-relaxed">
                                                由于是单文件 HTML，AI 功能需要您提供自己的 API Key。数据仅保存在您的手机本地。
                                            </p>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-[#37352F]/40 uppercase tracking-widest block mb-2 px-1">昵称</label>
                                            <input 
                                                type="text" 
                                                value={userProfile.name}
                                                onChange={e => setUserProfile(prev => ({...prev, name: e.target.value}))}
                                                className="w-full bg-[#F7F7F5] border border-[#37352F]/10 rounded-xl p-4 text-sm outline-none"
                                            />
                                        </div>
                                        <div className="flex gap-3 pt-4">
                                            <button onClick={() => {
                                                if(confirm('确定要清空所有本地数据吗？此操作不可撤销。')) {
                                                    localStorage.clear();
                                                    window.location.reload();
                                                }
                                            }} className="flex-1 py-4 bg-red-50 text-red-600 rounded-2xl font-bold text-xs hover:bg-red-100 transition-colors">清空数据</button>
                                            <button onClick={() => setShowSettings(false)} className="flex-1 py-4 bg-[#37352F] text-white rounded-2xl font-bold text-xs shadow-lg active:scale-95 transition-all">完成</button>
                                        </div>
                                    </div>
                                </motion.div>
                            </div>
                        )}
                    </AnimatePresence>
                </div>
            );
        };

        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
</body>
</html>
