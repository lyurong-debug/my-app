<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>懒人记账 PWA</title>
    
    <!-- PWA 基础配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="懒人记账">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%23F27D26'/><path d='M30 40h40v30H30z' fill='white'/></svg>">
    
    <!-- Manifest Data URI (使单文件支持 PWA 安装) -->
    <link rel="manifest" href="data:application/manifest+json,{'name':'懒人记账','short_name':'懒人记账','display':'standalone','start_url':'.','background_color':'%23F7F7F5','theme_color':'%23F27D26','icons':[{'src':'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2225%22 fill=%22%23F27D26%22/><path d=%22M30 40h40v30H30z%22 fill=%22white%22/></svg>','sizes':'192x192','type':'image/svg+xml'}]}">

    <!-- 使用国内高速 CDN 加载基础库 -->
    <script src="https://cdn.staticfile.org/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdn.staticfile.org/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.staticfile.org/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdn.staticfile.org/tailwind-css/2.2.19/tailwind.min.js"></script>

    <style>
        :root {
            --notion-bg: #F7F7F5;
            --notion-text: #37352F;
        }
        body {
            /* 使用系统原生字体，避免加载外部 Google Fonts */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background-color: var(--notion-bg);
            color: var(--notion-text);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        ::-webkit-scrollbar { display: none; }
        
        .chat-container { height: calc(100vh - 140px); }
        .stats-card { background: white; border: 1px solid rgba(55, 53, 47, 0.08); }
        .tab-active { color: #37352F; transform: scale(1.1); }
        .tab-inactive { color: rgba(55, 53, 47, 0.3); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // --- Service Worker 离线逻辑 ---
        const swCode = `
            const CACHE_NAME = 'lazy-book-v1';
            self.addEventListener('install', (e) => {
                e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(['./'])));
            });
            self.addEventListener('fetch', (e) => {
                e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
            });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swUrl).catch(() => {});
        }

        // --- React 应用代码 ---
        const { useState, useEffect, useMemo, useRef } = React;
        const e = React.createElement;

        const CATEGORIES = ["餐饮", "交通", "购物", "娱乐", "居家", "医疗", "教育", "人情", "其他"];
        const COLORS = ['#F27D26', '#37352F', '#07C160', '#2D9CDB', '#9B51E0', '#F2994A', '#EB5757'];

        function App() {
            const [activeTab, setActiveTab] = useState('chat');
            const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('lazy_tx') || '[]'));
            const [messages, setMessages] = useState(() => JSON.parse(localStorage.getItem('lazy_msgs') || '[{"id":1,"text":"你好！我是你的 AI 记账助手。你可以直接对我说“中午吃面花了15元”。","sender":"ai"}]'));
            const [apiConfig, setApiConfig] = useState(() => JSON.parse(localStorage.getItem('lazy_api') || '{"provider":"deepseek","key":""}'));
            const [inputText, setInputText] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [showSettings, setShowSettings] = useState(false);
            
            const scrollRef = useRef(null);

            // 数据持久化
            useEffect(() => localStorage.setItem('lazy_tx', JSON.stringify(transactions)), [transactions]);
            useEffect(() => localStorage.setItem('lazy_msgs', JSON.stringify(messages)), [messages]);
            useEffect(() => localStorage.setItem('lazy_api', JSON.stringify(apiConfig)), [apiConfig]);

            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages]);

            const handleSend = async () => {
                if (!inputText.trim() || isGenerating) return;
                const userMsg = { id: Date.now(), text: inputText, sender: 'user' };
                setMessages(prev => [...prev, userMsg]);
                setInputText('');

                if (!apiConfig.key) {
                    setMessages(prev => [...prev, { id: Date.now()+1, text: "⚠️ 请先在设置中配置 API Key", sender: 'ai' }]);
                    return;
                }

                setIsGenerating(true);
                try {
                    const prompt = `你是一个记账助手。解析: "${inputText}"。返回纯JSON: {"amount":数字,"category":"餐饮/交通/购物/娱乐/居家/医疗/教育/人情/其他","description":"备注","reply":"已记入..."}`;
                    
                    let aiText = "";
                    if (apiConfig.provider === 'gemini') {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiConfig.key}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const data = await res.json();
                        aiText = data.candidates[0].content.parts[0].text;
                    } else {
                        const res = await fetch('https://api.deepseek.com/chat/completions', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiConfig.key}` },
                            body: JSON.stringify({
                                model: "deepseek-chat",
                                messages: [{ role: "user", content: prompt }],
                                response_format: { type: "json_object" }
                            })
                        });
                        const data = await res.json();
                        aiText = data.choices[0].message.content;
                    }

                    const result = JSON.parse(aiText.match(/\{.*\}/s)[0]);
                    setTransactions(prev => [{
                        id: Date.now(),
                        amount: result.amount,
                        category: result.category,
                        description: result.description,
                        date: new Date().toISOString()
                    }, ...prev]);
                    setMessages(prev => [...prev, { id: Date.now()+2, text: result.reply, sender: 'ai' }]);
                } catch (err) {
                    setMessages(prev => [...prev, { id: Date.now()+2, text: "❌ 解析失败，请检查 API Key 或网络", sender: 'ai' }]);
                } finally {
                    setIsGenerating(false);
                }
            };

            const total = useMemo(() => transactions.reduce((s, t) => s + t.amount, 0), [transactions]);

            return e('div', { className: 'flex flex-col h-screen max-w-md mx-auto relative border-x border-gray-100 shadow-2xl bg-[#F7F7F5]' },
                // Header
                e('header', { className: 'bg-white/80 backdrop-blur-md p-4 flex justify-between items-center safe-top border-b border-gray-100' },
                    e('div', { className: 'flex items-center gap-2' },
                        e('div', { className: 'w-8 h-8 bg-[#37352F] rounded-lg flex items-center justify-center text-white font-bold' }, '懒'),
                        e('span', { className: 'font-bold text-sm' }, '懒人记账')
                    ),
                    e('button', { onClick: () => setShowSettings(true), className: 'p-2 text-gray-400' }, 
                        e('i', { 'data-lucide': 'settings', className: 'w-5 h-5' })
                    )
                ),

                // Content
                e('main', { className: 'flex-1 overflow-y-auto pb-24', ref: scrollRef },
                    activeTab === 'chat' ? (
                        e('div', { className: 'p-4 space-y-4' },
                            messages.map(m => e('div', { key: m.id, className: `flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'}` },
                                e('div', { className: `max-w-[85%] p-3 rounded-2xl text-sm ${m.sender === 'user' ? 'bg-[#37352F] text-white' : 'bg-white shadow-sm border border-gray-100'}` }, m.text)
                            ))
                        )
                    ) : (
                        e('div', { className: 'p-6 space-y-6' },
                            e('div', { className: 'stats-card p-6 rounded-3xl' },
                                e('p', { className: 'text-[10px] font-bold text-gray-400 uppercase tracking-widest' }, '累计支出'),
                                e('h2', { className: 'text-3xl font-bold mt-1' }, `¥${total.toFixed(2)}`),
                                e('div', { className: 'mt-6 h-2 bg-gray-100 rounded-full overflow-hidden flex' },
                                    CATEGORIES.map((c, i) => {
                                        const val = transactions.filter(t => t.category === c).reduce((s, t) => s + t.amount, 0);
                                        if (val === 0) return null;
                                        return e('div', { key: c, style: { width: `${(val/total)*100}%`, backgroundColor: COLORS[i % COLORS.length] } });
                                    })
                                )
                            ),
                            e('div', { className: 'space-y-3' },
                                e('h3', { className: 'text-[10px] font-bold text-gray-400 uppercase tracking-widest' }, '最近记录'),
                                transactions.map(t => e('div', { key: t.id, className: 'bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-50' },
                                    e('div', { className: 'flex items-center gap-3' },
                                        e('div', { className: 'w-10 h-10 bg-gray-50 rounded-xl flex items-center justify-center text-lg' }, t.category[0]),
                                        e('div', null, e('p', { className: 'text-sm font-bold' }, t.category), e('p', { className: 'text-[10px] text-gray-400' }, t.description || '无备注'))
                                    ),
                                    e('p', { className: 'font-bold' }, `-¥${t.amount.toFixed(2)}`)
                                ))
                            )
                        )
                    )
                ),

                // Footer
                e('footer', { className: 'fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-xl border-t border-gray-100 safe-bottom' },
                    activeTab === 'chat' && e('div', { className: 'p-4 flex gap-2' },
                        e('input', { 
                            className: 'flex-1 bg-gray-50 border border-gray-100 rounded-2xl px-4 py-3 text-sm outline-none',
                            placeholder: isGenerating ? 'AI 正在解析...' : '输入记账内容...',
                            value: inputText,
                            onChange: (e) => setInputText(e.target.value),
                            onKeyPress: (e) => e.key === 'Enter' && handleSend(),
                            disabled: isGenerating
                        }),
                        e('button', { onClick: handleSend, className: 'w-12 h-12 bg-[#37352F] text-white rounded-2xl flex items-center justify-center' }, 
                            e('i', { 'data-lucide': 'send', className: 'w-5 h-5' })
                        )
                    ),
                    e('div', { className: 'flex justify-around py-2' },
                        e('button', { onClick: () => setActiveTab('chat'), className: `flex flex-col items-center gap-1 ${activeTab === 'chat' ? 'tab-active' : 'tab-inactive'}` }, e('i', { 'data-lucide': 'message-square', className: 'w-5 h-5' }), e('span', { className: 'text-[10px] font-bold' }, '记账')),
                        e('button', { onClick: () => setActiveTab('stats'), className: `flex flex-col items-center gap-1 ${activeTab === 'stats' ? 'tab-active' : 'tab-inactive'}` }, e('i', { 'data-lucide': 'bar-chart-3', className: 'w-5 h-5' }), e('span', { className: 'text-[10px] font-bold' }, '账单'))
                    )
                ),

                // Settings Modal
                showSettings && e('div', { className: 'fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-6' },
                    e('div', { className: 'bg-white w-full rounded-3xl p-8 shadow-2xl' },
                        e('h3', { className: 'text-xl font-bold mb-6' }, '设置'),
                        e('div', { className: 'space-y-4' },
                            e('div', null,
                                e('label', { className: 'text-[10px] font-bold text-gray-400 uppercase mb-2 block' }, 'AI 服务商'),
                                e('div', { className: 'flex gap-2' },
                                    ['gemini', 'deepseek'].map(p => e('button', { 
                                        key: p,
                                        onClick: () => setApiConfig(prev => ({...prev, provider: p})),
                                        className: `flex-1 py-2 rounded-lg text-xs font-bold border ${apiConfig.provider === p ? 'bg-[#37352F] text-white' : 'text-gray-400'}`
                                    }, p))
                                )
                            ),
                            e('div', null,
                                e('label', { className: 'text-[10px] font-bold text-gray-400 uppercase mb-2 block' }, 'API Key'),
                                e('input', { 
                                    type: 'password',
                                    className: 'w-full bg-gray-50 border border-gray-100 rounded-xl p-3 text-sm',
                                    value: apiConfig.key,
                                    onChange: (e) => setApiConfig(prev => ({...prev, key: e.target.value}))
                                })
                            ),
                            e('div', { className: 'flex gap-3 pt-4' },
                                e('button', { onClick: () => { localStorage.clear(); window.location.reload(); }, className: 'flex-1 py-3 bg-red-50 text-red-600 rounded-2xl text-xs font-bold' }, '清空数据'),
                                e('button', { onClick: () => setShowSettings(false), className: 'flex-1 py-3 bg-[#37352F] text-white rounded-2xl text-xs font-bold' }, '完成')
                            )
                        )
                    )
                )
            );
        }

        // 初始化图标和渲染
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
        
        // 动态加载图标
        setInterval(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
